# ── Nginx + ModSecurity WAF pour le Backend ──────────────────────────────────
# Ce fichier configure Nginx pour agir comme un bouclier devant ton API Node.

server {
    listen 80;
    server_name _;

    # Empêcher l'affichage de la version de Nginx
    server_tokens off;

    # Proxy vers l'API Node.js qui tournera localement sur le port 5000
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy pour les uploads
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000/uploads/;
    }
}
