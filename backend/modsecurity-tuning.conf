# ── ModSecurity Tuning (Optimisé Utilisateurs) ────────────────────────────────
# On règle la protection pour ne pas gêner les vrais clients.

SecRuleEngine On

# ── 0. Fix CORS Preflight (OPTIONS) ──────────────────────────────────────────
# On autorise les requêtes OPTIONS sans filtrage pour le CORS.
SecRule REQUEST_METHOD "^OPTIONS$" "id:950000,phase:1,nolog,allow,ctl:ruleEngine=Off"

# ── 1. Augmentation des seuils (Plus de tolérance) ───────────────────────────
# Montage du seuil d'anomalie de 5 à 10 pour éviter les blocages sur de légères
# erreurs de syntaxe (par exemple une virgule mal placée).
SecAction \
  "id:900110, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:tx.inbound_anomaly_score_threshold=10, \
   setvar:tx.outbound_anomaly_score_threshold=10"

# ── 2. Autorisation des caractères spéciaux (Français/Arabe) ──────────────────
# Permet les accents et caractères spéciaux courants sans que le WAF ne panique.
SecAction \
 "id:900220, \
  phase:1, \
  nolog, \
  pass, \
  t:none, \
  setvar:'tx.restricted_extensions=.bak/ .config/ .conf/ .db/ .ini/ .log/ .old/ .tmp/'"

# ── 3. Whitelist Globale pour les JSON (Angular) ──────────────────────────────
# Les applications Angular envoient souvent des objets JSON complexes.
# On désactive la règle 949110 (Avertissement de score élevé) pour les flux JSON de confiance.
SecRule REQUEST_HEADERS:Content-Type "application/json" \
  "id:950001, \
   phase:1, \
   nolog, \
   pass, \
   ctl:ruleRemoveById=942100, \
   ctl:ruleRemoveById=942110"

# ── 4. Fix : Taille des requêtes pour les photos de produits ─────────────────
SecRequestBodyLimit 15728640
SecRequestBodyNoFilesLimit 1048576

# ── 5. Désactivation des règles trop zélées (Faux Positifs connus) ────────────
# Désactive les règles de "SQL Injection" trop sensibles sur les champs texte libres.
# Utile si un utilisateur écrit une phrase contenant des mots comme "select" ou "from".
SecRuleUpdateTargetById 942100 "!ARGS:description"
SecRuleUpdateTargetById 942110 "!ARGS:name"

# Règle d'exemption pour les fichiers statiques (Images, JS, CSS)
SecRule REQUEST_FILENAME "\.(jpg|jpeg|png|gif|js|css|ico|svg|woff2)$" \
    "id:950002, \
     phase:1, \
     nolog, \
     allow, \
     ctl:ruleEngine=Off"
