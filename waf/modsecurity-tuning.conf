# ── ModSecurity Rule Tuning ───────────────────────────────────────────────────
# This file is included AFTER the OWASP CRS rules and lets us whitelist
# legitimate traffic that would otherwise trigger false positives.

# ── Global settings ───────────────────────────────────────────────────────────
# Enforcement mode: DetectionOnly | On
SecRuleEngine On

# Max request body size accepted (10 MB, same as Express limit)
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 1048576

# Log the response body only for anomaly/error responses
SecResponseBodyAccess On
SecResponseBodyLimit 524288

# ── Paranoia Level ────────────────────────────────────────────────────────────
# Level 1 = essential rules only (few false positives, good starting point)
# Raise to 2/3/4 for stricter protection (more tuning required)
SecAction \
  "id:900000, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:tx.paranoia_level=1"

# ── Anomaly Score Thresholds ──────────────────────────────────────────────────
# Block when inbound score >= 5 (default). Raise to be more permissive.
SecAction \
  "id:900110, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:tx.inbound_anomaly_score_threshold=5, \
   setvar:tx.outbound_anomaly_score_threshold=4"

# ── Allowed HTTP Methods ──────────────────────────────────────────────────────
SecAction \
  "id:900200, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:'tx.allowed_methods=GET HEAD POST PUT DELETE PATCH OPTIONS'"

# ── File Upload Whitelist ─────────────────────────────────────────────────────
# Allow image uploads to /api/uploads (used by the product image uploader)
SecRule REQUEST_URI "@beginsWith /api/uploads" \
  "id:9001, \
   phase:1, \
   nolog, \
   pass, \
   ctl:requestBodyProcessor=MULTIPART"

# ── False Positive Suppressions ───────────────────────────────────────────────
# Angular sends large JSON payloads for product creation; suppress body-size
# warnings for authenticated API calls.
SecRuleRemoveById 200002
