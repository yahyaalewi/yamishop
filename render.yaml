services:
  # ── Yamishop API Sécurisée (WAF + Backend) ──────────────────────────────────
  - type: web
    name: yamishop-api
    runtime: docker
    plan: starter
    region: frankfurt
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 80
      - key: NODE_ENV
        value: production
      - fromGroup: yamishop-secrets
    disk:
      name: uploads-storage
      mountPath: /app/uploads
      sizeGB: 1
    healthCheckPath: /api/health
