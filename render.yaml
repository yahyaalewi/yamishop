services:
  # ── Yamishop API Sécurisée (WAF + Backend) ──────────────────────────────────
  - type: web
    name: yamishop-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 80
      - key: APP_PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - fromGroup: yamishop-secrets # Maintenant défini au début
    healthCheckPath: /api/health

envVarGroups:
  - name: yamishop-secrets
    envVars:
      - key: MONGO_URI
      - key: JWT_SECRET
      - key: ALLOWED_ORIGINS
        value: "*"
