services:
  # ── 1. Backend API (Service Privé) ──────────────────────────────────────────
  - type: pserv
    name: yamishop-backend
    env: docker
    plan: starter
    region: frankfurt
    dockerContext: ./backend
    dockerfile: Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - fromGroup: yamishop-secrets
    disk:
      name: uploads-storage
      mountPath: /app/uploads
      sizeGB: 1

  # ── 2. Frontend Angular (Service Privé) ──────────────────────────────────────
  - type: pserv
    name: yamishop-frontend
    env: docker
    plan: starter
    region: frankfurt
    dockerContext: ./frontend
    dockerfile: Dockerfile

  # ── 3. WAF: ModSecurity + OWASP CRS (Point d'Entrée Public) ─────────────────
  - type: web
    name: yamishop-waf
    env: docker
    plan: starter
    region: frankfurt
    dockerContext: ./waf
    dockerfile: Dockerfile
    envVars:
      - key: BACKEND
        value: http://yamishop-frontend:8080
      - key: PARANOIA
        value: "1"
      - key: ANOMALY_INBOUND
        value: "10"
      - key: ANOMALY_OUTBOUND
        value: "10"
      - key: ALLOWED_METHODS
        value: "GET HEAD POST PUT DELETE PATCH OPTIONS"
    healthCheckPath: /api/health
