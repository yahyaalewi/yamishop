services:
  # ── Yamishop API Sécurisée (WAF + Backend) ──────────────────────────────────
  - type: web
    name: yamishop-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 80
      - key: APP_PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - fromGroup: yamishop-secrets
    healthCheckPath: /api/health
