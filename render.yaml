services:
  # ── Yamishop API Sécurisée (WAF + Backend) ──────────────────────────────────
  - type: web
    name: yamishop-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: ./backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 80
      - key: APP_PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - fromGroup: yamishop-secrets # Maintenant défini au début
    healthCheckPath: /api/health

  # ── Yamishop Frontend (SPA) ────────────────────────────────────────────────
  - type: web
    runtime: static
    name: yamishop-web
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: frontend/dist/frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

envVarGroups:
  - name: yamishop-secrets
    envVars:
      - key: MONGO_URI
        value: "mongodb+srv://yahyaalewi:27076535@cluster0.rzpshho.mongodb.net/yamishop?appName=Cluster0"
      - key: JWT_SECRET
        value: "supersecretkey_yamishop_dev_only"
      - key: ALLOWED_ORIGINS
        value: "*"
