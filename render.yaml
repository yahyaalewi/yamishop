services:
  # ── Yamishop API Sécurisée (WAF + Backend) ──────────────────────────────────
  - type: web
    name: yamishop-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 80
      - key: APP_PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - fromGroup: yamishop-secrets # Maintenant défini au début
    healthCheckPath: /api/health

envVarGroups:
  - name: yamishop-secrets
    envVars:
      - key: MONGO_URI
        value: "mongodb://replace_with_your_atlas_uri"
      - key: JWT_SECRET
        value: "replace_with_a_secure_random_key"
      - key: ALLOWED_ORIGINS
        value: "*"
