version: "3.9"

services:
  # ── 1. Backend (Node.js + WAF intégré) ──────────────────────────────────────
  yamishop-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yamishop-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      ALLOWED_ORIGINS: "http://localhost"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - yamishop-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── 2. Frontend (Entry point port 80 → Nginx internal 8080) ──────────────────
  yamishop-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yamishop-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    networks:
      - yamishop-net
    depends_on:
      yamishop-backend:
        condition: service_healthy

volumes:
  uploads_data:


networks:
  yamishop-net:
    driver: bridge
