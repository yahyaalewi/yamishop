version: "3.9"

services:
  # ── 1. Backend (Node.js / Express) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yamishop-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      # Origins the WAF / browser may call the API from
      ALLOWED_ORIGINS: "http://localhost,http://waf"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - yamishop-net
    # Not exposed to the host – only reachable inside the Docker network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── 2. Frontend (Angular built → Nginx on internal port 8080) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yamishop-frontend
    restart: unless-stopped
    # Not exposed to the host – traffic enters only through the WAF
    networks:
      - yamishop-net
    depends_on:
      backend:
        condition: service_healthy

  # ── 3. WAF (ModSecurity + OWASP CRS, sole public entry point) ───────────────
  waf:
    build:
      context: ./waf
      dockerfile: Dockerfile
    container_name: yamishop-waf
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP  – the only port exposed to the Internet
    environment:
      # Proxy all requests to the frontend Nginx container
      BACKEND:             "http://frontend:8080"
      # OWASP CRS tuning (can also be set in modsecurity-tuning.conf)
      PARANOIA:            "1"      # 1-4, raise for stricter protection
      ANOMALY_INBOUND:     "5"      # block threshold for inbound requests
      ANOMALY_OUTBOUND:    "4"      # block threshold for responses
      ALLOWED_METHODS:     "GET HEAD POST PUT DELETE PATCH OPTIONS"
      # Logging
      MODSEC_AUDIT_LOG:    "/var/log/modsecurity/audit.log"
      MODSEC_AUDIT_ENGINE: "RelevantOnly"   # log only blocked/flagged requests
    volumes:
      - waf_logs:/var/log/modsecurity
    networks:
      - yamishop-net
    depends_on:
      - frontend

volumes:
  uploads_data:
  waf_logs:

networks:
  yamishop-net:
    driver: bridge
