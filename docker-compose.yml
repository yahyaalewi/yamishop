version: "3.9"

services:
  # ── 1. Backend (Node.js / Express) ──────────────────────────────────────────
  yamishop-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yamishop-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      ALLOWED_ORIGINS: "http://localhost,http://yamishop-waf"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - yamishop-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── 2. Frontend (Angular built → Nginx on internal port 8080) ────────────────
  yamishop-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yamishop-frontend
    restart: unless-stopped
    networks:
      - yamishop-net
    depends_on:
      yamishop-backend:
        condition: service_healthy

  # ── 3. WAF (ModSecurity + OWASP CRS, sole public entry point) ───────────────
  yamishop-waf:
    build:
      context: ./waf
      dockerfile: Dockerfile
    container_name: yamishop-waf
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      BACKEND:             "http://yamishop-frontend:8080"
      PARANOIA:            "1"
      ANOMALY_INBOUND:     "10"
      ANOMALY_OUTBOUND:    "10"
      ALLOWED_METHODS:     "GET HEAD POST PUT DELETE PATCH OPTIONS"
      MODSEC_AUDIT_LOG:    "/var/log/modsecurity/audit.log"
      MODSEC_AUDIT_ENGINE: "RelevantOnly"
    volumes:
      - waf_logs:/var/log/modsecurity
    networks:
      - yamishop-net
    depends_on:
      - yamishop-frontend

volumes:
  uploads_data:
  waf_logs:

networks:
  yamishop-net:
    driver: bridge
